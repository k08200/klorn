services:
  - type: web
    name: klorn-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      cd packages/core && pnpm build &&
      cd ../api && npx prisma generate && pnpm build
    # preDeployCommand intentionally omitted — start.sh runs prisma migrate
    # deploy with cold-start retry, so a separate preDeploy pass duplicates
    # that work AND its hang risk. The 2026-06-05 deploy timed out at 15min
    # silently between preDeploy and startCommand; collapsing into a single
    # migrate-with-retry path (start.sh) makes the failure mode visible
    # in the container logs.
    startCommand: cd packages/api && pnpm start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # LLM model pins — make prod explicit instead of relying on the in-code
      # defaults (which intentionally stay :free for self-hosters without paid
      # credit). Prod runs on a funded OpenRouter key, so every user-facing
      # surface is unified on the reliable paid flash model; per-user load is
      # billed to each user's own key when set (BYOK), and the per-user cost cap
      # (DAILY_COST_CAP_CENTS) backstops the shared key. FALLBACK_MODEL stays
      # :free on purpose — it is the $0 degradation net that only activates when
      # paid credit is exhausted (402), so the service degrades instead of
      # hard-failing. Model names are public, not secrets — pinned in-repo.
      - key: CHAT_MODEL
        value: "google/gemini-2.5-flash"
      - key: AGENT_MODEL
        value: "google/gemini-2.5-flash"
      - key: JUDGE_MODEL
        value: "google/gemini-2.5-flash"
      - key: VISION_MODEL
        value: "google/gemini-2.5-flash"
      - key: FALLBACK_MODEL
        value: "google/gemma-4-31b-it:free"
      - key: FRONTEND_URL
        sync: false
      - key: WEB_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PUSH_RECEIPT_BASE_URL
        sync: false
      - key: PORT
        value: "3001"
      - key: CORS_ORIGINS
        value: "https://klorn.ai,https://www.klorn.ai,https://app.klorn.ai"
      - key: RENDER_EXTERNAL_URL
        value: "https://klorn-api.onrender.com"
      - key: BETA_AUTO_PRO_ENABLED
        sync: false
      - key: BETA_AUTO_PRO_LIMIT
        sync: false
