services:
  - type: web
    name: klorn-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      cd packages/core && pnpm build &&
      cd ../api && npx prisma generate && pnpm build
    # preDeployCommand intentionally omitted — start.sh runs prisma migrate
    # deploy with cold-start retry, so a separate preDeploy pass duplicates
    # that work AND its hang risk. The 2026-06-05 deploy timed out at 15min
    # silently between preDeploy and startCommand; collapsing into a single
    # migrate-with-retry path (start.sh) makes the failure mode visible
    # in the container logs.
    startCommand: cd packages/api && pnpm start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # LLM model pins — make prod explicit instead of relying on the in-code
      # defaults (which intentionally stay :free for self-hosters without paid
      # credit). Prod runs on a funded OpenRouter key, so every user-facing
      # surface is unified on the reliable paid flash model; per-user load is
      # billed to each user's own key when set (BYOK), and the per-user cost cap
      # (DAILY_COST_CAP_CENTS) backstops the shared key. Model names are public,
      # not secrets — pinned in-repo.
      #
      # Privacy (Limited Use / no-train): hosted prod NEVER degrades onto :free
      # OpenRouter endpoints — their hosts may train on request data (verified
      # 2026-07-03: gemma-4-31b-it:free routes via Google AI Studio free tier +
      # OpenInference). On 402 the chain fails over to GEMINI_API_KEY (paid
      # Tier 1 project = no-train) instead. The account-level OpenRouter toggle
      # "Free endpoints that may train on request data" must ALSO stay off.
      # Self-host keeps the :free net by default (operator's own data-policy
      # choice).
      # Chat/assistant default = frontier (user-selectable in Settings from the
      # curated catalog; this is the default for users who never picked).
      - key: CHAT_MODEL
        value: "anthropic/claude-sonnet-5"
      - key: AGENT_MODEL
        value: "google/gemini-2.5-flash"
      - key: JUDGE_MODEL
        value: "google/gemini-2.5-flash"
      - key: VISION_MODEL
        value: "google/gemini-2.5-flash"
      - key: DISABLE_FREE_MODEL_FALLBACK
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: WEB_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PUSH_RECEIPT_BASE_URL
        sync: false
      - key: PORT
        value: "3001"
      - key: CORS_ORIGINS
        value: "https://klorn.ai,https://www.klorn.ai,https://app.klorn.ai"
      - key: RENDER_EXTERNAL_URL
        value: "https://klorn-api.onrender.com"
      - key: BETA_AUTO_PRO_ENABLED
        sync: false
      - key: BETA_AUTO_PRO_LIMIT
        sync: false
      # Prod-critical runtime config — declared (sync:false) so a blueprint sync
      # can never PRUNE them. Previously these lived only in the Render dashboard
      # and got dropped on redeploy, which silently disabled Web Push (the PUSH
      # tier went dark — set the value once in the dashboard; it now persists).
      # Values are set in the Render dashboard, not committed here.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        value: "mailto:hello@klorn.ai"
      # Real-time Gmail push (else the scheduler falls back to polling).
      - key: GMAIL_PUBSUB_TOPIC
        sync: false
      # Free-dyno keepalive ping target (else the dyno sleeps and misses pushes).
      - key: KEEPALIVE_URL
        sync: false
      # Admin allowlist for /api/diagnostics + decision-metrics (override watch).
      - key: ADMIN_EMAILS
        sync: false
