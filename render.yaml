services:
  - type: web
    name: hireeve-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      corepack enable &&
      pnpm install --frozen-lockfile --prod=false &&
      cd packages/core && pnpm build &&
      cd ../api && npx prisma generate && pnpm build
    startCommand: cd packages/api && pnpm start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WEB_URL
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: PUSH_RECEIPT_BASE_URL
        sync: false
      - key: PORT
        value: "3001"
      - key: CORS_ORIGINS
        value: "https://hireeve.com,https://www.hireeve.com,https://hire-eve-web.vercel.app"
      - key: RENDER_EXTERNAL_URL
        value: "https://hireeve.onrender.com"
