name: Dogfood — Daily E2E health check

on:
  schedule:
    # 00:00 UTC = 09:00 KST, Mon-Fri
    - cron: "3 0 * * 1-5"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL (defaults to jigeum.ai)"
        required: false
        default: "https://jigeum.ai"

concurrency:
  group: dogfood
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E health check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd packages/web && npx playwright install chromium --with-deps

      - name: Run E2E tests against prod
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://jigeum.ai' }}
        run: cd packages/web && npx playwright test --reporter=list

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Post failure summary
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## Dogfood E2E failed\n\n**Date:** ${new Date().toISOString().split('T')[0]}\n**Run:** ${runUrl}\n\nCheck the playwright-report artifact for screenshots and traces.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[dogfood] E2E failure — ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['bug', 'dogfood'],
            });
