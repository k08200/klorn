name: Judge Eval

# LLM accuracy gate for the 4-tier judge. Runs the committed synthetic
# 50-email set (packages/api/eval/judge-eval-set.json) through the
# LLM pipeline and fails when any gate is below its floor (poc-accuracy
# exits 2): overall ≥80%, PUSH recall ≥90%, SILENT precision ≥90%
# (see packages/api/src/eval-floors.ts for the floor rationale).
#
# This complements the deterministic gate that always runs in CI tests
# (src/__tests__/judge-eval-set.test.ts — fast-path + keyword fallback,
# no keys needed). Fork PRs don't receive secrets, so this job degrades
# to a skip-with-notice instead of a false failure.

on:
  workflow_dispatch:
  pull_request:
    paths:
      # The classifier now lives under src/judge/ (module slice 7, see
      # docs/api-module-map.md). Watch the whole module: any judge change
      # must run the eval floor, and a per-file list here silently stops
      # firing when a file moves.
      - "packages/api/src/judge/**"
      - "packages/api/eval/**"
      - ".github/workflows/eval.yml"

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-eval:
    name: LLM judge accuracy (overall ≥80%, PUSH recall ≥90%, SILENT precision ≥90%)
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # poc-accuracy never queries the DB, but the Prisma client is
      # constructed at import time and needs a syntactically valid URL.
      DATABASE_URL: "postgresql://eval:eval@localhost:5432/eval"
      # Match prod's flag state (#653 flipped body ON): the gate measures the
      # judge as deployed. Inert on the committed 50-item set (no `body`
      # fields) until the body-bearing eval set (#648) lands — see #650.
      JUDGE_INCLUDE_BODY: "true"
    steps:
      - name: Check for provider key
        id: key
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No provider key in this context (fork PR?) — skipping LLM eval. The deterministic eval gate still runs in the CI test job."
          fi

      - uses: actions/checkout@v4
        if: steps.key.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.key.outputs.present == 'true'
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        if: steps.key.outputs.present == 'true'

      - name: Install dependencies
        if: steps.key.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        if: steps.key.outputs.present == 'true'
        run: cd packages/api && npx prisma generate

      - name: Run judge accuracy gate
        if: steps.key.outputs.present == 'true'
        # The judge defaults to a paid model (JUDGE_MODEL, openai.ts), so the
        # run no longer competes with prod for :free daily quota and modest
        # parallelism is safe. ~1 min for 50 emails.
        #
        # Exit 3 = INSTRUMENT DEGRADED (#879): a transient provider failure
        # dropped items to the keyword fallback, so the numbers measure the
        # fallback, not the judge. Retry once after a pause — this exact shape
        # caused three consecutive false-fails on 2026-07-16. A real floor
        # failure (exit 2) is never retried.
        run: |
          cd packages/api
          set +e
          npx tsx scripts/poc-accuracy.ts --in=eval/judge-eval-set.json --concurrency=2 --delay=500
          code=$?
          if [ "$code" = "3" ]; then
            echo "::warning::Instrument degraded (provider unreachable) — retrying once in 60s"
            sleep 60
            npx tsx scripts/poc-accuracy.ts --in=eval/judge-eval-set.json --concurrency=2 --delay=500
            code=$?
          fi
          exit $code

      # Report-only readout on the REAL founder-labeled set (#648). The
      # original GO/NO-GO bar (≥80% overall on real mail) is measured on every
      # judge PR — first measurement: 81.1% overall, QUEUE recall 80.6%, but
      # PUSH recall 0/4 and SILENT precision 78.3%. Per-tier floors stay
      # NON-gating until PUSH support reaches ≥10 (at n=4 the 0.90 recall
      # floor demands 4/4 — coin-flip statistics, not a gate). Ratchet: when
      # the regenerated set has the support, point the gate step above at
      # real-eval-set.json and delete this one.
      - name: Real-mail readout (report-only)
        if: steps.key.outputs.present == 'true'
        run: |
          cd packages/api && npx tsx scripts/poc-accuracy.ts \
            --in=eval/real-eval-set.json --concurrency=2 --delay=500 \
            || echo "::warning::Real-mail per-tier floors not met (report-only until PUSH support ≥10) — numbers are in this step's log"
