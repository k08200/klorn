name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# All jobs run in PARALLEL (no `needs`) with a warm pnpm cache, so PR wall-clock
# is the slowest single job (build), not the sum of a serial chain. The founder
# runs the full gate locally before pushing (CLAUDE.md ship workflow); CI is the
# backstop, so fail-fast ordering buys little and costs minutes.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: "2.4.12"
      - name: Run Biome lint (errors only)
        run: biome check --diagnostic-level=error packages/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma types
        run: cd packages/api && pnpm exec prisma generate
      - name: Typecheck API
        run: cd packages/api && pnpm exec tsc --noEmit
      - name: Typecheck Core
        run: cd packages/core && pnpm exec tsc --noEmit
      # Web was previously unchecked here — a broken packages/web tsc slipped
      # through CI on 2026-07-03 (missing @capacitor/app types) because only
      # api+core were gated. Next.js `build` type-checks too, but tsc is the
      # cheap fast signal on every PR.
      - name: Typecheck Web
        run: cd packages/web && pnpm exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma types
        run: cd packages/api && pnpm exec prisma generate
      - name: Run tests
        run: cd packages/api && pnpm exec vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma types
        run: cd packages/api && pnpm exec prisma generate
      - name: Build all packages
        run: pnpm -r build

  # Guards prod: prod deploys via `prisma migrate deploy` (start.sh), so a
  # schema.prisma change with no matching migration silently ships nothing and
  # breaks at runtime. This replays every migration into a throwaway Postgres and
  # fails if the result doesn't match schema.prisma — catching drift at PR time,
  # not deploy time.
  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check migrations match schema (no drift)
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow
        run: |
          pnpm exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url postgresql://postgres:postgres@localhost:5432/shadow \
            --exit-code \
          || {
            echo "::error::schema.prisma and prisma/migrations have drifted. Generate a migration: cd packages/api && pnpm exec prisma migrate dev --name <change>";
            exit 1;
          }
