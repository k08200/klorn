name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: "2.4.10"
      - name: Run Biome lint (errors only)
        run: biome check --diagnostic-level=error packages/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        run: cd packages/api && npx prisma generate

      - name: Typecheck API
        run: cd packages/api && npx tsc --noEmit

      - name: Typecheck Core
        run: cd packages/core && npx tsc --noEmit

      # Web was previously unchecked here — a broken packages/web tsc slipped
      # through CI on 2026-07-03 (missing @capacitor/app types) because only
      # api+core were gated. Next.js `build` type-checks too, but tsc is the
      # cheap fast signal on every PR.
      - name: Typecheck Web
        run: cd packages/web && npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        run: cd packages/api && npx prisma generate

      - name: Run tests
        run: cd packages/api && npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        run: cd packages/api && npx prisma generate

      - name: Build all packages
        run: pnpm -r build
