name: Scope Budget

# The anti-relapse lock. POC.md (LOCKED) sets a hard surface budget for the
# Day-14 firewall POC:
#
#   - Web pages    ≤ 8    (packages/web  page.tsx)
#   - API routes   ≤ 12   (packages/api/src/routes/*.ts)
#   - Prisma models ≤ 30  (packages/api/prisma/schema.prisma)
#
# Prose locks (POC.md) were overridden repeatedly; this is the same budget as a
# FAILING BUILD instead. The counts also act as the net-new tripwire: once the
# deletion sprint brings each axis to budget, the next out-of-scope page / route
# / model pushes its count back over the line and turns this red again.
#
# This is RED today (counts exceed budget) — that is intentional. It is the
# pressure for the consolidation sprint. Whether it BLOCKS merge is a branch-
# protection choice (make it a required check once the sprint starts); the
# workflow itself just reports the truth and exits non-zero when over budget.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/web/src/app/**"
      - "packages/api/src/routes/**"
      - "packages/api/prisma/schema.prisma"
      - ".github/workflows/scope-budget.yml"
  push:
    branches: [main]

concurrency:
  group: scope-budget-${{ github.ref }}
  cancel-in-progress: true

jobs:
  budget:
    name: Surface budget (pages ≤8, routes ≤12, models ≤30)
    runs-on: ubuntu-latest
    env:
      MAX_PAGES: 8
      MAX_ROUTES: 12
      MAX_MODELS: 30
    steps:
      - uses: actions/checkout@v4

      - name: Count surfaces and enforce budget
        run: |
          set -euo pipefail

          pages=$(find packages/web/src/app -name "page.tsx" -type f | wc -l | tr -d ' ')
          routes=$(find packages/api/src/routes -name "*.ts" -type f | wc -l | tr -d ' ')
          models=$(grep -c "^model " packages/api/prisma/schema.prisma | tr -d ' ')

          fail=0
          check() {
            local label="$1" actual="$2" max="$3"
            if [ "$actual" -gt "$max" ]; then
              echo "::error::$label = $actual (budget $max) — OVER by $((actual - max))"
              fail=1
            else
              echo "$label = $actual (budget $max) — OK"
            fi
          }

          echo "## Scope budget (POC.md Day-14 lock)" >> "$GITHUB_STEP_SUMMARY"
          check "Web pages"     "$pages"  "$MAX_PAGES"  | tee -a "$GITHUB_STEP_SUMMARY"
          check "API routes"    "$routes" "$MAX_ROUTES" | tee -a "$GITHUB_STEP_SUMMARY"
          check "Prisma models" "$models" "$MAX_MODELS" | tee -a "$GITHUB_STEP_SUMMARY"

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Scope budget exceeded. Either delete out-of-scope surface or, if"
            echo "this is a deliberate, agreed scope change, bump the budget in"
            echo "POC.md AND the MAX_* env in this workflow in the same PR."
            exit 1
          fi
          echo "All surfaces within budget."
