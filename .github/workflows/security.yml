name: Security

# PR-facing security gate — one fast job (~15s). The slow, non-gating scans
# (CodeQL, dependency audit) live in security-deep.yml on push-to-main + a
# weekly cron so they never occupy a row in the PR checks list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Check for .env files in commits
        run: |
          if find packages/ -name ".env" -o -name ".env.local" -o -name ".env.production" | grep -q .; then
            echo "::error::Found .env files in repository! These should be in .gitignore"
            exit 1
          fi

      - name: Check for hardcoded credentials patterns
        run: |
          PATTERNS="password\s*=\s*['\"][^'\"]+['\"]|api[_-]?key\s*=\s*['\"][^'\"]+['\"]|secret\s*=\s*['\"][^'\"]+['\"]"
          if grep -rEn "$PATTERNS" packages/ --include="*.ts" --include="*.tsx" \
            | grep -v "node_modules" \
            | grep -v "\.d\.ts" \
            | grep -v "placeholder\|example\|test\|mock\|TODO\|process\.env\|env\.\|getenv\|import" \
            | grep -v "password.*=.*\"\"" \
            | head -20; then
            echo "::warning::Potential hardcoded credentials found — review above matches"
          fi
