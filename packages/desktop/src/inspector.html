<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Locked-down CSP: this page loads only its own bundled script + stylesheet
      and renders data handed in over IPC. No remote origins, no inline script,
      no inline style.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'none'"
    />
    <title>Klorn — Brain Inspector</title>
    <link rel="stylesheet" href="./inspector.css" />
  </head>
  <body>
    <header>
      <h1>Brain Inspector</h1>
      <p>The deterministic core the firewall classifies on, read live from the shared ontology.</p>
    </header>
    <div id="root"></div>
    <script type="module" src="./inspector-renderer.js"></script>
  </body>
</html>
